version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      eslint:
        patterns: ["eslint*", "@eslint/*", "typescript-eslint"]
      react:
        patterns: ["react", "react-dom", "react-router*"]
      supabase:
        patterns: ["@supabase/*"]
      vite:
        patterns: ["vite*", "@vitejs/*"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
