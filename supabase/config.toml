project_id = "sev7"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324
smtp_port = 54325
pop3_port = 54326

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://127.0.0.1:5173"
additional_redirect_urls = ["http://127.0.0.1:5173/auth/callback"]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false

# Pour activer Google OAuth :
# 1. Crée un projet OAuth dans https://console.cloud.google.com/apis/credentials
# 2. Authorized redirect URI : http://127.0.0.1:54321/auth/v1/callback (en dev)
# 3. Copie GOOGLE_CLIENT_ID et GOOGLE_CLIENT_SECRET dans un .env local et set
#    "enabled = true" ci-dessous, puis `supabase stop && supabase start`.
[auth.external.google]
enabled = false
client_id = "env(GOOGLE_CLIENT_ID)"
secret = "env(GOOGLE_CLIENT_SECRET)"
redirect_uri = "http://127.0.0.1:54321/auth/v1/callback"
skip_nonce_check = true

[realtime]
enabled = true

[edge_runtime]
enabled = true
